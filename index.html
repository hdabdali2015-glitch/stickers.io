<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StickerVerse | 1000+ Stickers</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #292f36;
            --light: #f7fff7;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            overflow-x: hidden;
        }

        /* --- Header & Hero --- */
        header {
            background: linear-gradient(135deg, var(--primary), #ff8e8e);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        p.subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* --- Floating Sticker Decoration --- */
        .floating-sticker {
            position: absolute;
            font-size: 3rem;
            animation: float 6s ease-in-out infinite;
            opacity: 0.8;
            z-index: 1;
        }
        .s1 { top: 10%; left: 5%; animation-delay: 0s; }
        .s2 { top: 20%; right: 10%; animation-delay: 1s; }
        .s3 { bottom: 10%; left: 15%; animation-delay: 2s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* --- Filter Section --- */
        .filter-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 2rem 1rem;
            position: sticky;
            top: 0;
            background: var(--light);
            z-index: 100;
            padding-top: 3rem;
        }

        .filter-btn {
            background: white;
            border: 2px solid #eee;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--dark);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        /* --- Sticker Grid --- */
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            padding: 2rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .sticker-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sticker-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: var(--secondary);
        }

        .sticker-img-container {
            width: 100%;
            height: 180px;
            background: #f9f9f9;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
            position: relative;
        }

        .sticker-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .sticker-card:hover .sticker-img-container img {
            transform: scale(1.1);
        }

        .sticker-info h3 {
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: var(--dark);
        }

        .sticker-info span {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .price-tag {
            display: inline-block;
            background: var(--accent);
            color: var(--dark);
            padding: 5px 12px;
            border-radius: 12px;
            font-weight: 700;
            margin-top: 10px;
        }

        .add-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background: var(--primary);
        }

        /* --- Footer --- */
        footer {
            background: var(--dark);
            color: white;
            text-align: center;
            padding: 3rem 1rem;
            margin-top: 4rem;
        }

        /* --- Loading Animation --- */
        .loader {
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
            color: #888;
            display: none;
        }

    </style>
</head>
<body>

    <header>
        <div class="floating-sticker s1">✨</div>
        <div class="floating-sticker s2">🦄</div>
        <div class="floating-sticker s3">🚀</div>
        <h1>StickerVerse</h1>
        <p class="subtitle">The world's largest collection of 1000+ Premium Stickers</p>
    </header>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterStickers('all')">All Stickers</button>
        <button class="filter-btn" onclick="filterStickers('cute')">Cute & Kawaii</button>
        <button class="filter-btn" onclick="filterStickers('anime')">Anime</button>
        <button class="filter-btn" onclick="filterStickers('action')">Action</button>
        <button class="filter-btn" onclick="filterStickers('retro')">Retro Vibes</button>
        <button class="filter-btn" onclick="filterStickers('abstract')">Abstract</button>
    </div>

    <div class="loader" id="loader">Loading more stickers...</div>
    
    <div class="sticker-grid" id="stickerGrid">
        <!-- Stickers will be injected here by JavaScript -->
    </div>

    <footer>
        <h2>StickerVerse</h2>
        <p>© 2023 StickerVerse. All rights reserved.</p>
        <p style="font-size: 0.8rem; margin-top: 10px; color: #888;">Designed for Sticker Lovers</p>
    </footer>

    <script>
        // Configuration
        const TOTAL_STICKERS = 1050; // Generating 1000+ stickers
        const categories = ['cute', 'anime', 'action', 'retro', 'abstract'];
        const grid = document.getElementById('stickerGrid');
        const loader = document.getElementById('loader');

        // Helper to generate random colors for placeholders
        function getRandomColor() {
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F43', '#54A0FF', '#5F27CD'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // Helper to get placeholder image URL
        function getImageUrl(category) {
            // Using placehold.co for dynamic text images
            const text = category.charAt(0).toUpperCase() + category.slice(1);
            const color = getRandomColor();
            return `https://placehold.co/300x300/${color.replace('#', '')}/ffffff?text=${text}+Sticker`;
        }

        // Generate Data
        const stickers = [];
        for (let i = 1; i <= TOTAL_STICKERS; i++) {
            const randomCat = categories[Math.floor(Math.random() * categories.length)];
            stickers.push({
                id: i,
                name: `${randomCat.charAt(0).toUpperCase() + randomCat.slice(1)} Sticker #${i}`,
                category: randomCat,
                price: (Math.random() * 5 + 1).toFixed(2),
                image: getImageUrl(randomCat)
            });
        }

        // Render Function
        function renderStickers(filter = 'all') {
            grid.innerHTML = ''; // Clear current grid
            
            const filteredStickers = filter === 'all' 
                ? stickers 
                : stickers.filter(s => s.category === filter);

            // Create elements
            filteredStickers.forEach(sticker => {
                const card = document.createElement('div');
                card.className = 'sticker-card';
                card.innerHTML = `
                    <div class="sticker-img-container">
                        <img src="${sticker.image}" alt="${sticker.name}">
                    </div>
                    <div class="sticker-info">
                        <h3>${sticker.name}</h3>
                        <span>${sticker.category}</span>
                        <div class="price-tag">$${sticker.price}</div>
                        <button class="add-btn" onclick="addToCart('${sticker.name}')">Add to Cart</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Filter Logic
        function filterStickers(category) {
            // Update active button state
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase().includes(category) || (category === 'all' && btn.innerText === 'All Stickers')) {
                    btn.classList.add('active');
                }
            });
            
            // Re-render
            renderStickers(category);
        }

        // Cart Interaction
        function addToCart(name) {
            alert(`Added "${name}" to your cart!`);
        }

        // Initial Load
        renderStickers();

    </script>
</body>
</html>
